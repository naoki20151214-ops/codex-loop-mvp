name: Issue Breakdown Bot

on:
  issues:
    types: [opened, labeled]

permissions:
  issues: write

jobs:
  breakdown:
    # ラベル "epic" が付いたときだけ動かす（opened直後にラベル付けでもOK）
    if: |
      github.event_name == 'issues' &&
      (github.event.action == 'opened' || github.event.action == 'labeled') &&
      contains(join(github.event.issue.labels.*.name, ','), 'epic')
    runs-on: ubuntu-latest
    steps:
      - name: Build prompt
        id: p
        run: |
          cat > prompt.txt << 'PROMPT'
          You are a senior software PM.
          Read the GitHub Issue below and break it down into small, concrete tasks.
          Output ONLY markdown with:
          - A short "Plan" (1-3 lines)
          - A checklist of 5-15 tasks (each task <= 1 line)
          - A "Next issue to implement" suggestion (1 line)
          Keep it practical and minimal.
          ---
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY:
          ${{ github.event.issue.body }}
          PROMPT

      - name: Call OpenAI Responses API
        id: ai
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          resp=$(curl -sS https://api.openai.com/v1/responses \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -d @- << 'JSON'
          {
            "model": "gpt-5",
            "input": [
              {"role":"user","content":[{"type":"input_text","text":""}]}
            ]
          }
JSON
          )
          # prompt.txt を埋め込む（空文字を置き換え）
          prompt=$(python - << 'PY'
import json
print(open("prompt.txt","r",encoding="utf-8").read())
PY
)
          resp=$(echo "$resp" | python - << 'PY'
import json,sys
data=json.load(sys.stdin)
# ここはダミー。次ステップで正しいリクエストを投げ直す。
print(json.dumps(data))
PY
)
          # ちゃんとプロンプト入りで投げ直す
          resp=$(curl -sS https://api.openai.com/v1/responses \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -d @- << JSON
          {
            "model": "gpt-5",
            "input": $(python - << 'PY'
import json
p=open("prompt.txt","r",encoding="utf-8").read()
print(json.dumps([{"role":"user","content":[{"type":"input_text","text":p}]}]))
PY
)
          }
JSON
          )
          echo "$resp" > resp.json
          # output_text を取り出す
          python - << 'PY'
import json
data=json.load(open("resp.json","r",encoding="utf-8"))
text=data.get("output_text","").strip()
open("out.md","w",encoding="utf-8").write(text if text else "(no output_text)")
PY

      - name: Comment back to issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          body=$(python - << 'PY'
print(open("out.md","r",encoding="utf-8").read())
PY
)
          gh api repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/comments \
            -f body="$body"
